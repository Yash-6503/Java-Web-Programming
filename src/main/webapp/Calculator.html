<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calculator</title>
</head>
<body style="text-align: center;">
	<h3>Calculator</h3>
	<form action="calculate" method="post">
		<div class="ip1">
			<label for="n1">Enter Number 1: </label>
			<input type="text" name="num1" id="n1" required placeholder="Enter number 1">
		</div>
		<br>
		<div class="ip2">
			<label for="n2">Enter Number 2: </label>
			<input type="text" name="num2" id="n2" required placeholder="Enter number 2">
		</div>
		<br>
		<input type="submit" name="calc" value="add">
		<input type="submit" name="calc" value="sub"> 
 		<input type="submit" name="calc" value="mul"> 
		<input type="submit" name="calc" value="div"> 
	</form>
</body>
</html>
