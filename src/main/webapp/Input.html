<!DOCTYPE html>
<html>

    <head>
        <meta charset="UTF-8">
        <title>Input-Form</title>
    </head>

    <body>
        <form action="form" method="post">
            <div class="id">
                <label for="eid">Employee Id :</label>
                <input type="text" placeholder="Enter Id" required name="empid" id="eid">
            </div>

            <div class="name">
                <label for="ename">Employee Name :</label>
                <input type="text" placeholder="Enter Name" required name="empname" id="ename">
            </div>

            <div class="add">
                <label for="eadd">Employee Address :</label>
                <input type="text" placeholder="Enter Address" required name="empaddr" id="eadd">
            </div>

            <div class="sal">
                <label for="esal">Employee Salary :</label>
                <input type="text" placeholder="Enter Salary" required name="empsal" id="esal">
            </div>

            <div class="gen">
                <label>Employee Gender :</label>
                <label for="male">Male</label>
                <input type="radio" required name="empgen" value="Male" id="male">
                <label for="female">Female</label>
                <input type="radio" required name="empgen" value="Female" id="female">
            </div>

            <div class="prof">
                <label>Employee Profile: </label>
                <label for="dev">Developer</label>
                <input type="radio" name="empProf" value="Developer" id="dev" required>
                <label for="tester">Tester</label>
                <input type="radio" name="empProf" value="Tester" id="tester" required>
                <label for="qa">QA</label>
                <input type="radio" name="empProf" value="QA" id="qa" required>
            </div>

            <div class="hobbies">
                <label for="">Enter Hobbies: </label>
                <label for="read">Reading</label>
                <input type="checkbox" name="emphobby" value="Reading" id="read">
                <label for="write">Writing</label>
                <input type="checkbox" name="emphobby" value="Writing" id="write">
                <label for="search">Searching</label>
                <input type="checkbox" name="emphobby" value="Searching" id="search">
                <label for="code">Coding</label>
                <input type="checkbox" name="emphobby" value="Coding" id="code">
            </div>

            <input type="submit" value="submit" id="sub">
        </form>
    </body>

</html>
