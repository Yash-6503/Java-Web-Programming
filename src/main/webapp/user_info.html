<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>User_Info</title>
</head>
<body>
	<h3>Enter your Details</h3>
	<form action="user" method="post">
		<div class="id">
			<label for="uid">UserId:</label>
			<input type="text" required name="userid" id="uid">
		</div> <br>
		<div class="fnm">
			<label for="fn">User FName:</label>
			<input type="text" required name="fname" id="fn">
		</div> <br>
		<div class="lnm">
			<label for="ln">User LName:</label>
			<input type="text" required name="lname" id="ln">
		</div> <br>
		<div class="mail">
			<label for="mail">User MailId:</label>
			<input type="text" required name="mailid" id="mail">
		</div> <br>
		<div class="phno">
			<label for="ph">User PhoneNo:</label>
			<input type="text" required name="phone" id="ph">
		</div> <br>
		<input type="submit" value="click">
	</form>
</body>
</html>
